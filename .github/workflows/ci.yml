name: CI & Deploy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

# Opt every job into the Node.js 24 runtime for JavaScript-based actions so
# any third-party action that has not yet shipped a Node 24 build still runs
# on Node 24 instead of the deprecated Node 20 runtime. All first-party
# `actions/*` used here are already pinned to Node-24-default majors.
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  # Only Chromium-based Playwright projects are exercised (Desktop Chrome,
  # Pixel 5, tablet-viewport). Downloading firefox + webkit saves ~200MB per
  # CI run on a cache miss and ~20–30s of extraction.
  PLAYWRIGHT_BROWSERS: chromium

jobs:
  check:
    name: Lint & Validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: voidzero-dev/setup-vp@v1
      - name: Check (format + lint + types)
        run: vp check
      - name: Validate content
        run: npm run validate

  unit-test:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: voidzero-dev/setup-vp@v1
      - run: vp test

  build-and-e2e:
    name: Build & E2E
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: voidzero-dev/setup-vp@v1

      # ── Playwright ──────────────────────────────────────────────────
      # Cache the browser binaries and the ~/.cache/ms-playwright marker so
      # cache-hit runs skip the ~150MB Chromium download. System-level deps
      # still need to be installed every time (the image is ephemeral), but
      # `install-deps chromium` is significantly faster than `install`.
      - name: Resolve Playwright version
        id: playwright-version
        run: |
          version=$(node -p "require('./package-lock.json').packages['node_modules/playwright-core'].version")
          echo "version=${version}" >> "$GITHUB_OUTPUT"

      - name: Cache Playwright browsers
        id: playwright-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ steps.playwright-version.outputs.version }}-${{ env.PLAYWRIGHT_BROWSERS }}

      - name: Install Playwright browsers (cache miss)
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: npx playwright install --with-deps ${{ env.PLAYWRIGHT_BROWSERS }}

      - name: Install Playwright system deps (cache hit)
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        run: npx playwright install-deps ${{ env.PLAYWRIGHT_BROWSERS }}

      # ── Diagram manifests ───────────────────────────────────────────
      # 1.3k+ mermaid sources render with headless Chromium on every build.
      # The `diagrams/manifest.json` files are gitignored but hold the
      # source-hash → output mapping that lets diagramkit skip re-rendering
      # when a source is unchanged. `restore-keys` falls back to the most
      # recent cache so a single diagram edit only re-renders that diagram,
      # not all 1300.
      - name: Cache diagram manifests
        uses: actions/cache@v4
        with:
          path: content/**/diagrams/manifest.json
          key: ${{ runner.os }}-diagram-manifests-${{ hashFiles('content/**/diagrams/*.mermaid', 'content/**/diagrams/*.excalidraw', 'content/**/diagrams/*.drawio', 'content/**/diagrams/*.dot', 'content/**/diagrams/*.gv', 'diagramkit.config.json5') }}
          restore-keys: |
            ${{ runner.os }}-diagram-manifests-

      - name: Build
        run: npm run build
      - name: Validate build output
        run: npm run validate:dist

      - name: E2E tests
        run: npm run test:e2e

      - name: Upload Playwright report
        uses: actions/upload-artifact@v7
        if: ${{ !cancelled() }}
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 30

      - name: Upload pages artifact
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        uses: actions/upload-pages-artifact@v5
        with:
          path: dist

  deploy:
    needs: [check, unit-test, build-and-e2e]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v5
