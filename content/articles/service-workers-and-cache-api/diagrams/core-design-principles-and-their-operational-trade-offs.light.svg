="translate(483, 84)"><rect class="basic label-container" style="" x="-130" y="-51" width="260" height="102"/><g class="label" style="" transform="translate(-100, -36)"><rect/><foreignObject width="200" height="72"><div xmlns="http://www.w3.org/1999/xhtml" style="display: table; white-space: break-spaces; line-height: 1.5; max-width: 200px; text-align: center; width: 200px;"><span class="nodeLabel"><p>Single version per scope<br />(prevents client inconsistency)</p></span></div></foreignObject></g></g><g class="node default" id="flowchart-P3-2" transform="translate(793, 84)"><rect class="basic label-container" style="" x="-110.484375" y="-39" width="220.96875" height="78"/><g class="label" style="" transform="translate(-80.484375, -24)"><rect/><foreignObject width="160.96875" height="48"><div xmlns="http://www.w3.org/1999/xhtml" style="display: table-cell; white-space: nowrap; line-height: 1.5; max-width: 200px; text-align: center;"><span class="nodeLabel"><p>Origin-isolated storage<br />(Cache + IndexedDB)</p></span></div></foreignObject></g></g><g class="node default" id="flowchart-T1-3" transform="translate(173, 298)"><rect class="basic label-container" style="" x="-130" y="-63" width="260" height="126"/><g class="label" style="" transform="translate(-100, -48)"><rect/><foreignObject width="200" height="96"><div xmlns="http://www.w3.org/1999/xhtml" style="display: table; white-space: break-spaces; line-height: 1.5; max-width: 200px; text-align: center; width: 200px;"><span class="nodeLabel"><p>Workers terminate between events<br />No persistent state in memory</p></span></div></foreignObject></g></g><g class="node default" id="flowchart-T2-4" transform="translate(483, 298)"><rect class="basic label-container" style="" x="-130" y="-51" width="260" height="102"/><g class="label" style="" transform="translate(-100, -36)"><rect/><foreignObject width="200" height="72"><div xmlns="http://www.w3.org/1999/xhtml" style="display: table; white-space: break-spaces; line-heig